<!DOCTYPE html>
<html>
<head>
    <title>TikTok Video Downloader</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #764ba2;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 TikTok Video Downloader</h1>
        <p>Paste TikTok video link below:</p>
        <input type="text" id="url" placeholder="https://www.tiktok.com/@username/video/123456789">
        <button onclick="downloadVideo()">Download Video</button>
        <div class="loader" id="loader">⏳ Downloading... Please wait</div>
        <div id="result" class="result"></div>
    </div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('url').value;
            if (!url) {
                showResult('Please enter a URL', 'error');
                return;
            }
            
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url})
                });
                const data = await response.json();
                
                if (data.success) {
                    showResult('✅ Download complete! Click below to save:', 'success');
                    setTimeout(() => {
                        window.location.href = `/get-video/${data.filename}`;
                    }, 1000);
                } else {
                    showResult('❌ Error: ' + data.error, 'error');
                }
            } catch (error) {
                showResult('❌ Error: ' + error.message, 'error');
            }
            document.getElementById('loader').style.display = 'none';
        }
        
        function showResult(msg, type) {
            const result = document.getElementById('result');
            result.className = 'result ' + type;
            result.innerHTML = msg;
        }
    </script>
</body>
</html>
